name: Auto Update Ft Rate

on:
  schedule:
    - cron: '0 0 1 * *' # ตั้งเวลารันทุกวันที่ 1 ของเดือน
  workflow_dispatch: # สร้างปุ่มให้เรากดรันเองได้ด้วย

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install axios cheerio

      - name: Run Scraper
        run: node scraper.js

      - name: Commit and Push updates
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "action@github.com"
          git add ft-rate.json
          git commit -m "Auto-update Ft rate" || echo "No changes to commit"
          git push
